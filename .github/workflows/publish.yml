name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    if: >-
      github.event.action == 'published' &&
      github.event.release.draft == false &&
      github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_EVENT_ACTION: ${{ github.event.action }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
      RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
      KDNA_TEST_ASSET: ${{ github.workspace }}/public-assets/references/public/laozi-wuwei/laozi-wuwei-0.1.1.kdna
      KDNA_TEST_PROTECTED_ASSET: ${{ github.workspace }}/public-core/fixtures/test_protected_entry.kdna
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-assets
          ref: 2dd1e2844fd8b8deff8ea0e2620fd946e5c9544f
          path: public-assets
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna
          ref: 1e77e3e0d486c330fe9f9262b514ef24c859d469
          path: public-core
          sparse-checkout: fixtures/test_protected_entry.kdna
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: '22.23.1'
          check-latest: false
          registry-url: 'https://registry.npmjs.org'
      - name: Fetch origin/main release ancestry evidence
        run: git fetch --no-tags origin main:refs/remotes/origin/main
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run release:context
      - name: Require an unpublished registry coordinate
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "create-kdna-web-app@$VERSION" version >/dev/null 2>&1; then
            echo "::error::create-kdna-web-app@$VERSION already exists; refusing a duplicate or conflicting release."
            exit 1
          fi
      - name: Exercise packed CLI, production servers, and Chromium
        run: npm run ci
      - run: npm pack --dry-run --ignore-scripts
      - name: Publish create-kdna-web-app
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "create-kdna-web-app@$VERSION" version >/dev/null 2>&1; then
            echo "::error::create-kdna-web-app@$VERSION appeared during release verification; refusing to overwrite or skip."
            exit 1
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
